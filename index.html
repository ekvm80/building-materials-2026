<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건축재료 2026 프로젝트 발표</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f7fa;
      color: #222;
      min-height: 100vh;
    }
    header {
      background: #1a3a5c;
      color: white;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; margin-bottom: 0.4rem; }
    header p  { font-size: 1rem; opacity: 0.8; }
    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .group {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .group-header {
      background: #2563eb;
      color: white;
      padding: 0.9rem 1.4rem;
      font-size: 1.1rem;
      font-weight: bold;
    }
    .group-header.group2 { background: #059669; }
    ul { list-style: none; }
    ul li a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1.4rem;
      text-decoration: none;
      color: #1a3a5c;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
      font-size: 0.97rem;
    }
    ul li:last-child a { border-bottom: none; }
    ul li a:hover { background: #eff6ff; }
    ul li a .icon { font-size: 1.2rem; }
    ul li a .label { flex: 1; }
    ul li a .arrow { color: #94a3b8; font-size: 0.85rem; }
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }
  </style>
  <style>
    #lock-overlay {
      position: fixed; inset: 0;
      background: #1a3a5c;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
    }
    #lock-overlay h2 { color: white; font-size: 1.3rem; margin-bottom: 0.4rem; }
    #lock-overlay p  { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 2rem; }
    #pin-display {
      display: flex; gap: 1rem; margin-bottom: 2rem;
    }
    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      transition: background 0.15s;
    }
    .pin-dot.filled { background: white; border-color: white; }
    #pin-error {
      color: #f87171; font-size: 0.85rem;
      margin-bottom: 1.2rem; min-height: 1.2em;
    }
    #keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
    }
    .key {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: white; font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .key:hover  { background: rgba(255,255,255,0.2); }
    .key:active { background: rgba(255,255,255,0.35); }
    .key.del    { font-size: 1rem; }
  </style>
</head>
<body>
  <div id="lock-overlay">
    <h2>건축재료 2026 프로젝트 발표</h2>
    <p>비밀번호 4자리를 입력하세요</p>
    <div id="pin-display">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div id="pin-error"></div>
    <div id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key del" onclick="pressKey('del')">⌫</button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key" style="visibility:hidden"></button>
    </div>
  </div>
  <script>
    (function() {
      if (sessionStorage.getItem('auth') === '1') {
        document.getElementById('lock-overlay').style.display = 'none';
        return;
      }
      var pin = '';
      var correct = '2026';
      window.pressKey = function(k) {
        var err = document.getElementById('pin-error');
        if (k === 'del') { pin = pin.slice(0, -1); }
        else if (pin.length < 4) { pin += k; }
        var dots = document.querySelectorAll('.pin-dot');
        dots.forEach(function(d, i) { d.classList.toggle('filled', i < pin.length); });
        err.textContent = '';
        if (pin.length === 4) {
          if (pin === correct) {
            sessionStorage.setItem('auth', '1');
            document.getElementById('lock-overlay').style.display = 'none';
          } else {
            err.textContent = '비밀번호가 올바르지 않습니다';
            pin = '';
            dots.forEach(function(d) { d.classList.remove('filled'); });
          }
        }
      };
    })();
  </script>
  <header>
    <h1>건축재료 2026 프로젝트 발표</h1>
    <p>AI 활용 앱 모음</p>
  </header>
  <main>
    <div class="group">
      <div class="group-header">1조 — 목재 (Timber)</div>
      <ul>
        <li><a href="01조/242951_박선후.html">
          <span class="icon">📄</span>
          <span class="label">박선후</span>
          <span class="arrow">열기 →</span>
        </a></li>
        <li><a href="01조/252216_정하진.html">
          <span class="icon">📄</span>
          <span class="label">정하진</span>
          <span class="arrow">열기 →</span>
        </a></li>
        <li><a href="01조/251283_강나림.html">
          <span class="icon">📄</span>
          <span class="label">강나림</span>
          <span class="arrow">열기 →</span>
        </a></li>
      </ul>
    </div>
    <div class="group">
      <div class="group-header group2">2조 — 석재 (Stone)</div>
      <ul>
        <li><a href="02조/건축재료 2조_강이지 ai활용 앱.html">
          <span class="icon">🤖</span>
          <span class="label">강이지 — AI 활용 앱</span>
          <span class="arrow">열기 →</span>
        </a></li>
        <li><a href="02조/건축재료 2조_김태균 ai활용 앱.html">
          <span class="icon">🤖</span>
          <span class="label">김태균 — AI 활용 앱</span>
          <span class="arrow">열기 →</span>
        </a></li>
        <li><a href="02조/건축재료 2조_배서준 ai활용 앱.html">
          <span class="icon">🤖</span>
          <span class="label">배서준 — AI 활용 앱</span>
          <span class="arrow">열기 →</span>
        </a></li>
        <li><a href="02조/건축재료 2조_오수인 ai활용 앱.html">
          <span class="icon">🤖</span>
          <span class="label">오수인 — AI 활용 앱</span>
          <span class="arrow">열기 →</span>
        </a></li>
      </ul>
    </div>
  </main>
  <footer>건축재료 강의 · 2026년 1학기</footer>
</body>
</html>
